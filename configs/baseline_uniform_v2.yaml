# Baseline v2: byte-premium-uniform trilingual, WSD schedule, 5 epochs.
# Goal: produce a competitive first submission (vs the v1 1-epoch undertrained
# attempt) that is also a strong zero-point for the C1/C2 ablation grid.
name: baseline-uniform-100M-v2
out_dir: checkpoints/baseline_uniform_v2

data:
  repos:
    eng: BabyLM-community/babylm-eng
    nld: BabyLM-community/babylm-nld
    zho: BabyLM-community/babylm-zho
  category_whitelist: {}
  mixture: {eng: 0.3334, nld: 0.3333, zho: 0.3333}
  schedule: []
  budget_reference_tokens: 100000000   # 100M corpus
  max_epochs: 5                        # 5 epochs -> 500M effective tokens
  token_field: num-tokens
  streaming: false                     # Hub layout is category-clustered (data card)
  shuffle_buffer: 10000
  seed: 12

tokenizer:
  tokenizer_dir: models/tokenizer-joint-bpe-32k    # reuse v1 tokenizer
  vocab_size: 32768
  algorithm: bpe
  train_chars_per_lang: 50000000
  specials: ["<pad>", "<bos>", "<eos>", "<unk>"]

model:
  n_layers: 12
  d_model: 768
  n_heads: 12
  n_kv_heads: 12
  d_ff: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  max_seq_len: 1024
  tie_embeddings: true
  init_std: 0.02

optim:
  optimizer: adamw
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 200                    # ~5% of total steps
  lr_schedule: wsd                     # warmup -> constant peak -> linear decay tail
  min_lr_ratio: 0.1
  wsd_decay_frac: 0.25                 # last 25% of steps decay to 0.1*peak

train:
  micro_batch_size: 16
  grad_accum_steps: 2                  # eff. batch 128 sequences = 131k tokens/step
  seq_len: 1024
  bf16: true
  compile: false
  gradient_checkpointing: false
  log_every: 100
  # Total effective budget = 500M tokens.
  # Save revisions across the whole curve so we get a clean fast-eval.
  save_revisions: [1000000, 2000000, 3000000, 4000000, 5000000, 6000000, 7000000, 8000000, 9000000,
                   10000000, 20000000, 30000000, 40000000, 50000000, 60000000, 70000000, 80000000, 90000000,
                   100000000, 200000000, 300000000, 400000000, 500000000]
