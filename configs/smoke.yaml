# Smoke-test cell: tiny everything. Used to validate the scaffold end-to-end
# in seconds. Real ablations live in their own configs.
name: smoke
out_dir: checkpoints/smoke

data:
  repos:
    eng: BabyLM-community/babylm-eng
    nld: BabyLM-community/babylm-nld
    zho: BabyLM-community/babylm-zho
  category_whitelist: {}
  mixture: {eng: 0.34, nld: 0.33, zho: 0.33}
  schedule: []
  budget_reference_tokens: 200000      # 200k ref tokens; smoke test crosses save_revisions[0]
  max_epochs: 10
  token_field: num-tokens
  streaming: true
  shuffle_buffer: 1000
  seed: 12

tokenizer:
  tokenizer_dir: models/tokenizer-smoke-bpe-2k
  vocab_size: 2048
  algorithm: bpe
  train_chars_per_lang: 200000          # 200k chars per lang — fast
  specials: ["<pad>", "<bos>", "<eos>", "<unk>"]

model:
  n_layers: 4
  d_model: 128
  n_heads: 4
  n_kv_heads: 4
  d_ff: 512
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  max_seq_len: 256
  tie_embeddings: true
  init_std: 0.02

optim:
  optimizer: adamw
  lr: 5.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 5
  lr_schedule: cosine
  min_lr_ratio: 0.1

train:
  micro_batch_size: 4
  grad_accum_steps: 1
  seq_len: 256
  bf16: true
  compile: false
  log_every: 5
  save_revisions: [10000, 100000]      # save early (10k) and mid (100k)
