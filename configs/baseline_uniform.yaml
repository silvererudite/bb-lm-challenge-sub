# Baseline cell: byte-premium-uniform trilingual mixture, full 100M budget.
# This run produces the zero-point both for the transfer matrix (C1) and the
# mixture-allocation Pareto sweep (C2).
name: baseline-uniform-100M
out_dir: checkpoints/baseline_uniform

data:
  repos:
    eng: BabyLM-community/babylm-eng
    nld: BabyLM-community/babylm-nld
    zho: BabyLM-community/babylm-zho
  category_whitelist: {}
  # Equal probability per language. Byte-premium adjustment is applied
  # downstream in the budget accounting, so each language contributes the
  # same number of REFERENCE tokens despite different raw token counts.
  mixture: {eng: 0.3334, nld: 0.3333, zho: 0.3333}
  schedule: []
  budget_reference_tokens: 100000000   # 100M ref tokens, the BabyLM cap
  max_epochs: 10
  token_field: num-tokens
  streaming: false                     # Hub layout is category-clustered; need full in-memory shuffle (see data_card.md)
  shuffle_buffer: 10000
  seed: 12

tokenizer:
  tokenizer_dir: models/tokenizer-joint-bpe-32k
  vocab_size: 32768
  algorithm: bpe
  train_chars_per_lang: 50000000
  specials: ["<pad>", "<bos>", "<eos>", "<unk>"]

model:
  n_layers: 12
  d_model: 768
  n_heads: 12
  n_kv_heads: 12
  d_ff: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  max_seq_len: 1024
  tie_embeddings: true
  init_std: 0.02

optim:
  optimizer: adamw
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 100                    # ~13% of est total steps at 4xA10G, eff batch 131k tok/step
  lr_schedule: cosine
  min_lr_ratio: 0.1

train:
  micro_batch_size: 16                # per device; 32 OOMs on 23GB, 16 fits
  grad_accum_steps: 2                 # restore 32-eq per-device batch via accumulation
  seq_len: 1024
  bf16: true
  compile: false
  log_every: 50
  # Fast-eval revision schedule from collate_results.py:
  # 1M, 2M, ..., 9M, 10M, 20M, ..., 90M, 100M, 200M, ..., 1000M
  save_revisions: [1000000, 2000000, 3000000, 4000000, 5000000, 6000000, 7000000, 8000000, 9000000,
                   10000000, 20000000, 30000000, 40000000, 50000000, 60000000, 70000000, 80000000, 90000000,
                   100000000]
